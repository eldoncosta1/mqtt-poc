server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Assets com hash são imutáveis
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA — todas as rotas servem index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
